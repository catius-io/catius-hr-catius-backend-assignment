spring:
  datasource:
    url: jdbc:sqlite:build/test-order-service.db
    driver-class-name: org.sqlite.JDBC

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
    open-in-view: false

  kafka:
    listener:
      auto-startup: false
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"

# WireMock 통합 테스트에서 @DynamicPropertySource로 덮어씀
inventory:
  base-url: http://localhost:0

# Kafka 토픽 (main과 동일 — test config은 main을 inherit하지 않고 단독 로드되므로 명시 필요)
catius:
  kafka:
    topics:
      order-confirmed: order.order-confirmed.v1
      inventory-release-requested: inventory.release-requested.v1
    publish-timeout-seconds: 5

# Resilience4j 테스트용 축소 수치 — CB 전이를 빠르게 관찰하기 위함.
# (ADR-004의 prod 수치는 main application.yml에)
spring.cloud.openfeign.client.config:
  inventoryClient:
    connect-timeout: 500
    read-timeout: 500

resilience4j:
  circuitbreaker:
    instances:
      inventoryClient:
        register-health-indicator: false
        sliding-window-type: COUNT_BASED
        sliding-window-size: 5
        minimum-number-of-calls: 3
        failure-rate-threshold: 50
        slow-call-duration-threshold: 800ms
        slow-call-rate-threshold: 100
        wait-duration-in-open-state: 200ms
        permitted-number-of-calls-in-half-open-state: 2
        automatic-transition-from-open-to-half-open-enabled: true
        ignore-exceptions:
          - com.catius.order.service.exception.InsufficientStockException
          - com.catius.order.service.exception.AlreadyCompensatedException
          - com.catius.order.service.exception.ReservationConflictException
          - com.catius.order.service.exception.ProductNotFoundException
  retry:
    instances:
      inventoryClient:
        max-attempts: 2
        wait-duration: 50ms
        ignore-exceptions:
          - io.github.resilience4j.circuitbreaker.CallNotPermittedException
          - com.catius.order.service.exception.InsufficientStockException
          - com.catius.order.service.exception.AlreadyCompensatedException
          - com.catius.order.service.exception.ReservationConflictException
          - com.catius.order.service.exception.ProductNotFoundException

# 테스트 중 sweeper가 실행되어 상태를 변경하는 것을 방지하기 위해 매우 큰 인터벌로 설정.
# 명시적인 recoveryRunner.recover() 호출은 테스트가 직접 수행.
order:
  compensation:
    sweeper-interval-ms: 86400000

management:
  endpoints:
    enabled-by-default: false
