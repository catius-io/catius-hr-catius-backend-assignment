server:
  port: 8081

spring:
  application:
    name: order-service

  datasource:
    url: jdbc:sqlite:./order-service.db
    driver-class-name: org.sqlite.JDBC

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
        format_sql: true
    show-sql: false
    open-in-view: false

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    consumer:
      group-id: order-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    listener:
      # 로컬 전체 기동 시 외부 Kafka 가 없다면 `false` 로 두고, 테스트에서만 Embedded Kafka 로 검증하는 것도 한 방법입니다.
      auto-startup: true

# Inventory 서비스 Feign 클라이언트 베이스 URL
inventory:
  base-url: ${INVENTORY_BASE_URL:http://localhost:8082}

# Feign HTTP 클라이언트 timeout — @TimeLimiter 미적용 대안.
# read-timeout 과 R4J retry 의 wait-duration 합이 전체 호출 budget 결정.
# (read-timeout 2s × max-attempts 3 + wait-duration 500ms × 2 = 최대 ~7s)
spring.cloud.openfeign.client.config:
  inventoryClient:
    connect-timeout: 1000
    read-timeout: 2000

# Resilience4j 기본 예시 — 근거를 가지고 수치를 조정하고, 조정 이유를 README 에 기재하세요.
resilience4j:
  # AOP aspect 적용 순서 — Spring @Order 컨벤션상 *낮은 값* 이 *높은 precedence* = OUTER.
  # 본 설정: Retry(2) OUTER / CircuitBreaker(3) INNER. R4J 2.2.0 의 default 와 동일한 의미 — 명시화.
  #
  # 동작: 각 retry 시도가 CB 체크를 거침. CB 가 OPEN 이면 retry 시도 자체가 즉시 차단되어 빠른 실패.
  # 의도: "이미 알려진 깨진 서비스에 retry 하지 마라" — R4J 공식 권장.
  #
  # 4xx 영구 실패는 ignore-exceptions 로 CB failure 카운트에서 제외되므로,
  # CB 의 sliding-window 는 사실상 5xx/timeout/네트워크 실패 *각 시도* 만 보게 됨.
  # 이게 "가용성 신호" 로 충분히 fine-grained 하다는 R4J 의 default 결정.
  circuitbreaker:
    circuit-breaker-aspect-order: 3   # INNER
    instances:
      inventoryClient:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 10s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        # 영구 실패(4xx) 는 inventory 의 가용성 이슈가 아니므로 CB failure 카운트에서 제외.
        # CB 는 "5xx / 네트워크 / timeout" 같은 서비스 자체 문제만 반영해야 한다.
        ignore-exceptions:
          - com.catius.order.client.exception.InsufficientStockException
          - com.catius.order.client.exception.ProductNotFoundException
  timelimiter:
    instances:
      inventoryClient:
        # 현재 미적용 — R4J @TimeLimiter 는 CompletableFuture 변환이 필요해 동기 Feign 시그니처와 맞지 않음.
        # 실효 timeout 은 spring.cloud.openfeign.client.config.inventoryClient.read-timeout 으로 동등하게 구현.
        timeout-duration: 2s
  retry:
    retry-aspect-order: 2              # OUTER (낮은 값이 outer)
    instances:
      inventoryClient:
        max-attempts: 3
        wait-duration: 500ms
        # "영구 실패는 재시도 무의미" 정책. 그 외 (5xx / 네트워크 / timeout) 는 모두 재시도.
        ignore-exceptions:
          - com.catius.order.client.exception.InsufficientStockException
          - com.catius.order.client.exception.ProductNotFoundException

# Kafka 토픽 — 지원자가 정한 네이밍 규칙으로 조정
catius:
  kafka:
    topics:
      order-confirmed: order.order-confirmed.v1

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,circuitbreakers
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.hibernate.SQL: INFO
    org.springframework.kafka: INFO
    io.github.resilience4j: INFO
