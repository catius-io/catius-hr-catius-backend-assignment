server:
  port: 8081

spring:
  application:
    name: order-service

  datasource:
    url: jdbc:sqlite:./order-service.db
    driver-class-name: org.sqlite.JDBC

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
        format_sql: true
    show-sql: false
    open-in-view: false

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    consumer:
      group-id: order-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    listener:
      # 로컬 전체 기동 시 외부 Kafka 가 없다면 `false` 로 두고, 테스트에서만 Embedded Kafka 로 검증하는 것도 한 방법입니다.
      auto-startup: true

# Inventory 서비스 Feign 클라이언트 베이스 URL
inventory:
  base-url: ${INVENTORY_BASE_URL:http://localhost:8082}

# Feign 타임아웃 — ADR-004 잠정 수치 (k6 실측 후 확정)
spring.cloud.openfeign.client.config:
  inventoryClient:
    connect-timeout: 500
    read-timeout: 1000

# Resilience4j 수치 — ADR-004 잠정. 명시적 도메인 4xx 예외는 ignore-exceptions로 CB·retry 모두에서 제외하여
# "차감 없음 확정" 시그널이 일시적 장애와 섞이지 않도록 한다 (ADR-003 explicit vs ambiguous 분기).
resilience4j:
  circuitbreaker:
    instances:
      inventoryClient:
        register-health-indicator: true
        sliding-window-type: COUNT_BASED
        sliding-window-size: 20
        minimum-number-of-calls: 10
        failure-rate-threshold: 50
        slow-call-duration-threshold: 800ms
        slow-call-rate-threshold: 50
        wait-duration-in-open-state: 5s
        permitted-number-of-calls-in-half-open-state: 3
        automatic-transition-from-open-to-half-open-enabled: true
        ignore-exceptions:
          - com.catius.order.service.exception.InsufficientStockException
          - com.catius.order.service.exception.AlreadyCompensatedException
          - com.catius.order.service.exception.ReservationConflictException
          - com.catius.order.service.exception.ProductNotFoundException
  retry:
    instances:
      inventoryClient:
        max-attempts: 2
        wait-duration: 100ms
        # ADR-004 — exponential ×2 + jitter. max-attempts=2에서는 실효 효과는 작지만
        # 향후 max-attempts 상향 시 자동으로 의미를 가지도록 정렬.
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        enable-randomized-wait: true
        randomized-wait-factor: 0.5
        ignore-exceptions:
          # CB가 OPEN일 때 던지는 CNPE는 retry 무의미 — 즉시 fast-fail
          - io.github.resilience4j.circuitbreaker.CallNotPermittedException
          - com.catius.order.service.exception.InsufficientStockException
          - com.catius.order.service.exception.AlreadyCompensatedException
          - com.catius.order.service.exception.ReservationConflictException
          - com.catius.order.service.exception.ProductNotFoundException

# Kafka 토픽 — 지원자가 정한 네이밍 규칙으로 조정
catius:
  kafka:
    topics:
      order-confirmed: order.order-confirmed.v1

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics,circuitbreakers
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.hibernate.SQL: INFO
    org.springframework.kafka: INFO
    io.github.resilience4j: INFO
