server:
  port: 8082

spring:
  application:
    name: inventory-service

  datasource:
    url: jdbc:sqlite:./inventory-service.db
    driver-class-name: org.sqlite.JDBC

  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
        format_sql: true
    show-sql: false
    open-in-view: false

  sql:
    init:
      mode: always

  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    consumer:
      group-id: inventory-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        # order-service가 보낸 type header(다른 패키지 fqn)를 무시하고 본 서비스의 클래스로 역직렬화.
        spring.json.use.type.headers: false
        spring.json.value.default.type: com.catius.inventory.service.event.InventoryReleaseRequestedEvent
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    listener:
      auto-startup: true

# Kafka 토픽 (ADR-005)
catius:
  kafka:
    topics:
      inventory-release-requested: inventory.release-requested.v1

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.hibernate.SQL: INFO
    org.springframework.kafka: INFO
