spring:
  datasource:
    url: jdbc:h2:mem:inventory-service-test;DB_CLOSE_DELAY=-1;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: never

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
    show-sql: false
    open-in-view: false

  kafka:
    listener:
      auto-startup: false

logging:
  level:
    org.hibernate.SQL: WARN
