server:
  port: 0

spring:
  application:
    name: inventory-service-test

  datasource:
    url: jdbc:sqlite:./inventory-service-test.db
    driver-class-name: org.sqlite.JDBC

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
    show-sql: false
    open-in-view: false

  kafka:
    listener:
      auto-startup: false
